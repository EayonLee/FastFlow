spring:
  config:
    activate:
      on-profile: test
  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${TEST_DB_URL:jdbc:postgresql://127.0.0.1:5432/fastflow_test}
    username: ${TEST_DB_USERNAME:postgres}
    password: ${TEST_DB_PASSWORD:}

auth:
  jwt:
    secret: ${TEST_AUTH_JWT_SECRET:test-jwt-secret-change-me}
  password:
    secret-key: ${TEST_AUTH_PASSWORD_SECRET_KEY:test-aes-key-change-me}
